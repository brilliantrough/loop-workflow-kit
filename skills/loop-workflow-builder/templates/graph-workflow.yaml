name: example-loop
entry: plan
nodes:
  plan:
    kind: agent
    engine: opencode
    prompt: prompts/plan.md
    next: codegen
  codegen:
    kind: agent
    engine: codex
    sandbox: workspace-write
    prompt: prompts/codegen.md
    next: correctness
  correctness:
    kind: gate
    command:
      - bun
      - run
      - checks/correctness.ts
      - --run-dir
      - "{{runDirectory}}"
    pass: perf
    fail: repair_correctness
  repair_correctness:
    kind: agent
    engine: codex
    sandbox: workspace-write
    prompt: prompts/repair-correctness.md
    next: correctness
    max_attempts: 3
  perf:
    kind: command
    command:
      - bun
      - run
      - checks/perf.ts
      - --run-dir
      - "{{runDirectory}}"
    pass: review
    fail: optimize
  optimize:
    kind: agent
    engine: codex
    sandbox: workspace-write
    prompt: prompts/optimize.md
    next: perf
    max_attempts: 3
  review:
    kind: agent
    engine: opencode
    prompt: prompts/review.md
    pass: finalize
    fail: plan
  finalize:
    kind: command
    command:
      - bun
      - run
      - checks/finalize.ts
      - --run-dir
      - "{{runDirectory}}"
