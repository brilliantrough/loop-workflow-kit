name: operator-dsl-loop
entry: plan
nodes:
  plan:
    kind: agent
    engine: opencode
    prompt: prompts/operator-plan.md
    next: codegen
  codegen:
    kind: agent
    engine: codex
    sandbox: workspace-write
    prompt: prompts/operator-codegen.md
    next: correctness
  correctness:
    kind: gate
    cwd: ..
    command:
      - bun
      - run
      - checks/fake-correctness.ts
      - --run-dir
      - "{{runDirectory}}"
    pass: perf
    fail: repair_correctness
  repair_correctness:
    kind: agent
    engine: codex
    sandbox: workspace-write
    prompt: prompts/operator-repair-correctness.md
    next: correctness
    max_attempts: 2
  perf:
    kind: command
    cwd: ..
    command:
      - bun
      - run
      - checks/fake-perf.ts
      - --run-dir
      - "{{runDirectory}}"
    pass: review
    fail: optimize
  optimize:
    kind: agent
    engine: codex
    sandbox: workspace-write
    prompt: prompts/operator-optimize.md
    next: perf
    max_attempts: 2
  review:
    kind: agent
    engine: opencode
    prompt: prompts/operator-review.md
